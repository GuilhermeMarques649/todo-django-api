<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segunda</title>
</head>
<body>
    <h1>Tarefas de Segunda</h1>

    <ul>
        {% for tarefa in tarefas %}
            <li>{{ tarefa.titulo }}</li>
        {% empty %}
            <li>Nenhuma tarefa cadastrada para segunda.</li>
        {% endfor %}
    </ul>
</body>
</html>
