<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Editar tarefa</title>
</head>
<body>
  <h1>Editar tarefa</h1>

  <form method="post">
    {% csrf_token %}
    <input type="text" name="titulo" value="{{ tarefa.titulo }}" required>
    <button type="submit">Salvar</button>
  </form>

  <p><a href="{% url 'segunda' %}">Voltar</a></p>
</body>
</html>
