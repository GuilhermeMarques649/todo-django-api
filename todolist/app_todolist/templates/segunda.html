<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segunda</title>
<style>
  ul {
    list-style: none;
    padding: 0;
  }

  li {
    display: flex;
    justify-content: space-between;
    align-items: center;

    margin: 10px 0;  
    padding: 8px 12px;

    width: 400px;       
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  button {
    padding: 4px 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
    <h1>Tarefas de Segunda</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="titulo" placeholder="Nova tarefa..." required>
        <button type="submit">Adicionar</button>
    </form>
<ul>
{% for tarefa in tarefas %}
    <li>
        {{ tarefa.titulo }}

        <a href="{% url 'editar_tarefa' tarefa.id %}" style="margin-left:10px;">
            Editar
        </a>

        <form action="{% url 'deletar_tarefa' tarefa.id %}" method="post"
              style="display:inline; margin-left:10px;">
            {% csrf_token %}
            <button type="submit">Excluir</button>
        </form>
    </li>
{% empty %}
    <li>Nenhuma tarefa cadastrada para segunda.</li>
{% endfor %}
</ul>
</body>
</html>
